name: 110_gold-price-monthly

on:
  schedule:
    - cron: '30 6 15-25 * *'   # Roz 15-25 tarikh, 12:00 PM IST (06:30 UTC) - jab tak data mil jaaye
  workflow_dispatch:

concurrency:
  group: 110_gold-price-monthly
  cancel-in-progress: false

jobs:
  gold-price-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Chrome & Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        python -m pip install --upgrade pip
        pip install selenium webdriver-manager supabase

    - name: Run Scraper Script
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: |
        cd Agents
        python 110_gold-price-monthly.py

    - name: Upload Debug Screenshots
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: monthly-step-screenshots
        path: Agents/step*.png

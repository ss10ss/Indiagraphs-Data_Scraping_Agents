name: 111_silver-price-monthly

on:
  schedule:
    - cron: '0 0 15 * *'   # Monthly execution cycle
  workflow_dispatch:

concurrency:
  group: 111_silver-price-monthly
  cancel-in-progress: false

jobs:
  silver-price-monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome & Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          python -m pip install --upgrade pip
          pip install selenium webdriver-manager supabase

      - name: Run Scraper Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          cd Agents
          python 111_silver-price-monthly.py

      - name: Upload Debug Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monthly-silver-step-screenshots
          path: Agents/step*.png

      - name: Notify on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "🚨 Workflow FAILED: 111_silver-price-monthly"
          to: shashank.srivastava@iqation.com
          from: GitHub Actions
          body: |
            Workflow failed: 111_silver-price-monthly
            Repo: ${{ github.repository }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
